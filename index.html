<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="minimum-scale=0.2, maximum-scale=5.0, user-scalable=yes">
<title>Porky's Game® - Dadi</title>
<style>
@font-face {
    font-family: 'Carlito';
    src: url('Carlito-Bold.ttf') format('truetype');
    font-weight: bold;
    font-style: normal;
}

* {
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
}
::selection { background: transparent; }
::-moz-selection { background: transparent; }

html {
  scrollbar-width: none;
  overscroll-behavior-x: none;
  touch-action: manipulation;
  overflow-y: auto;
  user-select: none;
  -webkit-user-select: none;
}
html::-webkit-scrollbar, body::-webkit-scrollbar { width: 0; height: 0; }

body {
  width: 100%;
  min-height: 100vh;
  min-height: 100dvh;
  font-family: 'Carlito', Arial, Helvetica, sans-serif;
  text-align: center;
  background:
  linear-gradient(
    rgba(215, 175, 90, 0.85),
    rgba(215, 175, 90, 0.85)
  ),
  url("images/logo_splash.png");
  background-repeat: no-repeat;
  background-position: center;
  background-size: cover;
  background-attachment: fixed;
  overflow-x: hidden;
  touch-action: manipulation;
}

h1 {
  margin-top: 2.5vmin;
  font-size: 5vmin;
  color: #502369;
  font-weight: bold;
  overflow-x: hidden;
}

.description {
  font-size: 2.8vmin;
  margin: 0.8vmin auto 2vmin;
  color: #333;
  font-weight: bold;
  max-width: 80vmin;
}

.dice-row {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  gap: 8vmin;
  flex-wrap: wrap;
  margin-top: 2vmin;
}

.dice-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1.5vmin;
}

.dice-label {
  font-size: 3.8vmin;
  color: #502369;
  font-weight: bold;
  margin-bottom: 4vmin;
}

/* ===== Dado CSS 3D ===== */
.scene {
  width: 30vmin;
  height: 30vmin;
  min-width: 20vmin;
  min-height: 20vmin;
  max-width: 500px;
  max-height: 500px;
  perspective: 900px;
  cursor: pointer;
}

.cube {
  position: relative;
  width: 100%;
  height: 100%;
  transform-style: preserve-3d;
  transition: transform 1.4s cubic-bezier(.22,1,.36,1);
}

.face {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(145deg, #9b4fd4, #2d0558);
  border: 3px solid #c8860a;
  border-radius: 1.2vmin;
  box-shadow: inset 0 0 14px rgba(0,0,0,.5), 0 0 12px rgba(80,35,105,.4);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 5vmin;
  font-weight: 900;
  color: #ffd700;
  text-shadow: 0 0 8px rgba(0,0,0,.6);
}

.face img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

/* dimensione cubo dinamica via JS (translateZ = metà larghezza) */
.face.f1 { transform: rotateY(0deg)    translateZ(var(--half)); }
.face.f2 { transform: rotateY(90deg)   translateZ(var(--half)); }
.face.f3 { transform: rotateY(180deg)  translateZ(var(--half)); }
.face.f4 { transform: rotateY(-90deg)  translateZ(var(--half)); }
.face.f5 { transform: rotateX(90deg)   translateZ(var(--half)); }
.face.f6 { transform: rotateX(-90deg)  translateZ(var(--half)); }

.cube.rolling {
  transition: transform 1.4s cubic-bezier(.22,1,.36,1);
}

.result-label {
  min-height: 1.6vmin;
  font-size: 3vmin;
  font-weight: bold;
  color: #502369;
  background: #f9e0a7;
  border: 2px solid #502369;
  border-radius: 1vmin;
  padding: 0.5vmin 1.5vmin;
  max-width: 32vmin;
  line-height: 1.3;
  margin-top: 4vmin;
}

.actions-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(20vmin, 28vmin));
  grid-auto-rows: auto;
  gap: 1.5vmin 3vmin;
  justify-content: center;
  margin-top: 4vmin;
}

.actions-grid button {
  width: 100%;
  box-sizing: border-box;
}

.btn-red {
  background: linear-gradient(145deg, #e05050, #8a1010);
  color: white;
}
.btn-red:hover { filter: brightness(1.15); transform: scale(1.03); }
.btn-red:active { transform: scale(0.98); }

button {
  padding: 1.2vmin 2vmin;
  margin: 0.5vmin;
  font-size: 2.5vmin;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
}

.btn {
  background: linear-gradient(145deg, #dfad24, #9b710e);
  color: #3b2500;
}
.btn:hover { filter: brightness(1.15); transform: scale(1.03); }
.btn:active { transform: scale(0.98); }

.btn-purple {
  background: linear-gradient(145deg, #a45de6, #502369);
  color: white;
}
.btn-purple:hover { filter: brightness(1.2); transform: scale(1.03); }
.btn-purple:active { transform: scale(0.98); }

.btn-player {
  background: linear-gradient(145deg, #dfad24, #9b710e);
  color: #3b2500;
}
.btn-player:hover { filter: brightness(1.15); transform: scale(1.03); }
.btn-player:active { transform: scale(0.98); }

.btn:disabled, .btn-purple:disabled, .btn-player:disabled, .btn-red:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  filter: none !important;
  transform: none !important;
}

.actions-row {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 3vmin;
  margin-top: 4vmin;
  flex-wrap: wrap;
}

.info {
  margin-top: 2vmin;
  font-size: 3.2vmin;
  color: #502369;
  font-weight: bold;
}

/* ===== Sezione giocatori ===== */
.players-box {
  margin: 5vmin auto 3vmin;
  max-width: 92vmin;
  border: 3px solid #502369;
  border-radius: 1.2vmin;
  background: rgba(255,255,255,0.6);
  padding: 2vmin 2.5vmin;
}

.players-title {
  font-size: 2.6vmin;
  color: #502369;
  font-weight: bold;
  margin-bottom: 1.5vmin;
}

.players-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-template-rows: repeat(10, auto);
  grid-auto-flow: column;
  gap: 0.8vmin 2.5vmin;
}

.player-slot {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 1.9vmin;
  font-weight: bold;
  color: #333;
  text-align: left;
  background: rgba(255,255,255,0.5);
  border-radius: 0.5vmin;
  padding: 0.3vmin 0.8vmin;
}

.player-slot .player-name {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.player-slot .player-remove {
  background: none;
  border: none;
  color: #a00000;
  font-weight: bold;
  font-size: 1.8vmin;
  cursor: pointer;
  padding: 0 0.5vmin;
  margin: 0;
}

.player-input-wrap {
  display: flex;
  align-items: center;
}

.player-input {
  width: 100%;
  font-size: 1.9vmin;
  font-weight: bold;
  font-family: inherit;
  border: 1px dashed #502369;
  border-radius: 0.5vmin;
  padding: 0.3vmin 0.8vmin;
  background: rgba(255,255,255,0.7);
  color: #333;
}

.players-error {
  min-height: 2.4vmin;
  font-size: 1.8vmin;
  color: #a00000;
  font-weight: bold;
  margin-top: 1vmin;
}
</style>
</head>
<body>

<h1>Porky's Game® – Dadi</h1>
<p class="description">Lancia i dadi singolarmente <br> oppure in sequenza (prima il dado 1, poi il dado 2).<br>
Ogni faccia corrisponde a una mossa, ma se ti rifiuti, <br> il gruppo decide la tua penitenza <br> (e potrebbe piacerti di meno, quindi FALLO!).</p>

<div class="dice-row">

  <div class="dice-col">
    <div class="dice-label">COSA</div>
    <div class="scene">
      <div class="cube" id="cube1">
        <div class="face f1"></div>
        <div class="face f2"></div>
        <div class="face f3"></div>
        <div class="face f4"></div>
        <div class="face f5"></div>
        <div class="face f6"></div>
      </div>
    </div>
    <div class="result-label" id="result1">
      <div class="res-azione" id="azione1">—</div>
    </div>
  </div>

  <div class="dice-col">
    <div class="dice-label">DOVE</div>
    <div class="scene">
      <div class="cube" id="cube2">
        <div class="face f1"></div>
        <div class="face f2"></div>
        <div class="face f3"></div>
        <div class="face f4"></div>
        <div class="face f5"></div>
        <div class="face f6"></div>
      </div>
    </div>
    <div class="result-label" id="result2">
      <div class="res-azione" id="azione2">—</div>
    </div>
  </div>

</div>

<div class="actions-grid">
  <button class="btn" id="btnDado1">LANCIA<br><small>DADO 1</small></button>
  <button class="btn-purple" id="btnSequenza">TUTTO CASUALE<br><small>(dadi + giocatori)</small></button>
  <button class="btn" id="btnDado2">LANCIA<br><small>DADO 2</small></button>

  <button class="btn-player" id="btnGioc1">ESTRAI<br><small>GIOCATORE 1</small></button>
  <button class="btn-red" id="btnEliminaTutti">ELIMINA<br><small>GIOCATORI</small></button>
  <button class="btn-player" id="btnGioc2">ESTRAI<br><small>GIOCATORE 2</small></button>
</div>

<div class="info" id="infoMsg"></div>

<!-- ===== Sezione giocatori ===== -->
<div class="players-box">
  <div class="players-title">GIOCATORI (max 40)</div>
  <div class="players-grid" id="playersGrid"></div>
  <div class="players-error" id="playersError"></div>
</div>

<script>
/* =========================================================
   AZIONI DELLE FACCE — placeholder da sostituire in futuro.
   Indice array 0..5 corrisponde alla faccia 1..6 del dado.
   ========================================================= */
/* =========================================================
   POOL DI AZIONI per il dado1 — espandibile a piacere.
   Ad ogni lancio vengono scelte 6 voci a caso dal pool
   (o tutte se il pool ha esattamente 6 elementi) e assegnate
   alle 6 facce fisiche del cubo: il dado resta sempre a 6 facce,
   ma il contenuto cambia lancio dopo lancio.
   Per aggiungere una nuova azione, basta aggiungere una riga qui:
   { img: "images/nomefile.png", label: "ETICHETTA" }
   ========================================================= */
const poolDado1 = [
  { img: "images/bacio.png",        label: "BACIA" },
  { img: "images/lecca.png",        label: "LECCA" },
  { img: "images/succhia.png",      label: "SUCCHIA" },
  { img: "images/mano.png",         label: "SCHIAFFO" },
  { img: "images/pagaia.png",       label: "PAGAIATA" },
  { img: "images/naso.png",         label: "ANNUSA" },
  { img: "images/denti.png",        label: "MORDI" },
  { img: "images/sussurra.png",     label: "SUSSURRA" },
  { img: "images/calcio.png",       label: "CALCIA" },
  { img: "images/cazzo.png",        label: "CAZZO" },
  { img: "images/intimo.png",       label: "FIGA" },
  { img: "images/pizzicotto.png",   label: "PIZZICOTTO" },
];

/* =========================================================
   POOL DI AZIONI per il dado2 — stesso meccanismo del dado1:
   espandibile a piacere, 6 voci pescate a caso ad ogni lancio.
   ========================================================= */
const poolDado2 = [
  { img: "images/faccia.png",   label: "FACCIA" },
  { img: "images/culo.png",     label: "CULO" },
  { img: "images/coscia.png",   label: "COSCIA" },
  { img: "images/intimo.png",   label: "FIGA" },
  { img: "images/piedi.png",    label: "PIEDI" },
  { img: "images/seno.png",     label: "TETTE" },
  { img: "images/orecchio.png", label: "ORECCHIO" },
  { img: "images/naso.png",     label: "NASO" },
  { img: "images/cazzo.png",    label: "CAZZO" },
  { img: "images/bacio.png",    label: "BOCCA" },
  { img: "images/lecca.png",    label: "LINGUA" },
];

function sampleSenzaRipetizioni(pool, n) {
  const copia = pool.slice();
  for (let i = copia.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copia[i], copia[j]] = [copia[j], copia[i]];
  }
  // se il pool ha meno di n elementi, ripeto ciclicamente
  const risultato = [];
  for (let i = 0; i < n; i++) risultato.push(copia[i % copia.length]);
  return risultato;
}

function rimescolaFacce(cubeEl, pool) {
  const faces = cubeEl.querySelectorAll('.face');
  const scelte = sampleSenzaRipetizioni(pool, faces.length);
  faces.forEach((faceEl, i) => {
    const item = scelte[i];
    faceEl.innerHTML = `<img src="${item.img}" alt="${item.label}">`;
  });
  return scelte.map(item => item.label); // array di 6 etichette, in ordine f1..f6
}

/* Imposta la metà del lato del cubo come variabile CSS,
   in modo che le facce restino sempre attaccate al cubo
   indipendentemente dalla dimensione reale a schermo. */
function setCubeHalf(sceneEl) {
  const size = sceneEl.getBoundingClientRect().width;
  sceneEl.style.setProperty('--half', (size / 2) + 'px');
}

const scene1 = document.querySelector('#cube1').parentElement;
const scene2 = document.querySelector('#cube2').parentElement;
setCubeHalf(scene1);
setCubeHalf(scene2);
window.addEventListener('resize', () => { setCubeHalf(scene1); setCubeHalf(scene2); });

/* Rotazioni che portano ciascuna faccia frontale verso la camera */
const ROT = {
  1: { x: 0,    y: 0   },
  2: { x: 0,    y: -90 },
  3: { x: 0,    y: -180},
  4: { x: 0,    y: 90  },
  5: { x: -90,  y: 0   },
  6: { x: 90,   y: 0   }
};

const azioneVal = [null, null]; // azione corrente per dado1 (idx0) e dado2 (idx1)

function renderResult(boxNum) {
  const idx = boxNum - 1;
  const el = boxNum === 1 ? azione1 : azione2;
  const azione = azioneVal[idx];
  const giocatore = (players.length >= 2) ? giocatoreVal[idx] : null;

  if (!azione && !giocatore) {
    el.textContent = "—";
  } else if (azione && !giocatore) {
    el.textContent = `Risultato: → ${azione}`;
  } else if (!azione && giocatore) {
    el.textContent = giocatore;
  } else {
    el.textContent = `${giocatore}: → ${azione}`;
  }
}

function lanciaDado(cubeEl, boxNum, mosse, giriRef, skipRender) {
  return new Promise(resolve => {
    const numero = Math.floor(Math.random() * 6) + 1;
    const rot = ROT[numero];
    const idx = boxNum - 1;

    const extraGiriX = (2 + Math.floor(Math.random() * 2)) * 360;
    const extraGiriY = (2 + Math.floor(Math.random() * 2)) * 360;

    giriRef.val += extraGiriX;
    const targetX = giriRef.val + rot.x;
    giriRef.valY = (giriRef.valY || 0) + extraGiriY;
    const targetY = giriRef.valY + rot.y;

    if (!skipRender) {
      const el = boxNum === 1 ? azione1 : azione2;
      el.textContent = "Lancio in corso…";
    }
    cubeEl.style.transform = `rotateX(${targetX}deg) rotateY(${targetY}deg)`;

    setTimeout(() => {
      const azione = mosse[numero - 1];
      azioneVal[idx] = azione;
      if (!skipRender) renderResult(boxNum);
      resolve({ numero, azione });
    }, 1450);
  });
}

const stato1 = { val: 0, valY: 0 };
const stato2 = { val: 0, valY: 0 };

const cube1 = document.getElementById('cube1');
rimescolaFacce(cube1, poolDado1); // popolamento iniziale, prima del primo lancio
const cube2 = document.getElementById('cube2');
rimescolaFacce(cube2, poolDado2); // popolamento iniziale, prima del primo lancio
const azione1 = document.getElementById('azione1');
const azione2 = document.getElementById('azione2');
const infoMsg = document.getElementById('infoMsg');

const btnDado1 = document.getElementById('btnDado1');
const btnDado2 = document.getElementById('btnDado2');
const btnSequenza = document.getElementById('btnSequenza');
const btnGioc1 = document.getElementById('btnGioc1');
const btnGioc2 = document.getElementById('btnGioc2');
const btnEliminaTutti = document.getElementById('btnEliminaTutti');

function setButtonsDisabled(disabled) {
  btnDado1.disabled = disabled;
  btnDado2.disabled = disabled;
  btnSequenza.disabled = disabled;
  btnGioc1.disabled = disabled;
  btnGioc2.disabled = disabled;
}

scene1.addEventListener('click', async () => {
  if (btnDado1.disabled) return;
  setButtonsDisabled(true);
  infoMsg.textContent = "";
  const mosseAttuali1 = rimescolaFacce(cube1, poolDado1);
  await lanciaDado(cube1, 1, mosseAttuali1, stato1);
  setButtonsDisabled(false);
});

scene2.addEventListener('click', async () => {
  if (btnDado2.disabled) return;
  setButtonsDisabled(true);
  infoMsg.textContent = "";
  const mosseAttuali2 = rimescolaFacce(cube2, poolDado2);
  await lanciaDado(cube2, 2, mosseAttuali2, stato2);
  setButtonsDisabled(false);
});

btnDado1.addEventListener('click', async () => {
  setButtonsDisabled(true);
  infoMsg.textContent = "";
  const mosseAttuali1 = rimescolaFacce(cube1, poolDado1);
  await lanciaDado(cube1, 1, mosseAttuali1, stato1);
  setButtonsDisabled(false);
});

btnDado2.addEventListener('click', async () => {
  setButtonsDisabled(true);
  infoMsg.textContent = "";
  const mosseAttuali2 = rimescolaFacce(cube2, poolDado2);
  await lanciaDado(cube2, 2, mosseAttuali2, stato2);
  setButtonsDisabled(false);
});

btnSequenza.addEventListener('click', async () => {
  setButtonsDisabled(true);
  infoMsg.textContent = "";
  azione1.textContent = "Lancio in corso…";
  azione2.textContent = "Lancio in corso…";

  const mosseAttuali1 = rimescolaFacce(cube1, poolDado1);
  const r1 = await lanciaDado(cube1, 1, mosseAttuali1, stato1, true);
  const mosseAttuali2 = rimescolaFacce(cube2, poolDado2);
  const r2 = await lanciaDado(cube2, 2, mosseAttuali2, stato2, true);

  if (players.length >= 2) {
    const g1 = pickRandomExcluding(null);
    giocatoreVal[0] = g1;
    const g2 = pickRandomExcluding(g1);
    giocatoreVal[1] = g2;
  }

  renderResult(1);
  renderResult(2);
  setButtonsDisabled(false);
});

/* =========================================================
   GESTIONE GIOCATORI
   ========================================================= */
let players = [];
try {
  const saved = localStorage.getItem('porkys_players');
  if (saved) players = JSON.parse(saved);
} catch (e) { players = []; }

let giocatoreVal = [null, null];

const playersGrid = document.getElementById('playersGrid');
const playersError = document.getElementById('playersError');
const MAX_PLAYERS = 40;
const NAME_REGEX = /^[A-Za-zÀ-ÖØ-öø-ÿ0-9 ]+$/;

function savePlayers() {
  try { localStorage.setItem('porkys_players', JSON.stringify(players)); }
  catch (e) { /* storage non disponibile, ignoro */ }
}

function setGiocatore(boxNum, name) {
  const idx = boxNum - 1;
  giocatoreVal[idx] = name;
  renderResult(boxNum);
}

function pickRandomExcluding(excludeName) {
  const pool = players.filter(p => p !== excludeName);
  if (pool.length === 0) return excludeName || null;
  return pool[Math.floor(Math.random() * pool.length)];
}

function drawPlayer(boxNum) {
  if (players.length < 2) return;
  const idx = boxNum - 1;
  const otherIdx = 1 - idx;
  const ownVal = giocatoreVal[idx];
  const otherVal = giocatoreVal[otherIdx];

  if (players.length === 2) {
    // con esattamente 2 giocatori esistono solo 2 stati possibili:
    // estrarre uno significa automaticamente assegnare l'altro alla casella opposta
    const newOwn = players.find(p => p !== ownVal) || players[0];
    const newOther = players.find(p => p !== newOwn);
    giocatoreVal[idx] = newOwn;
    giocatoreVal[otherIdx] = newOther;
  } else {
    // con 3+ giocatori l'estrazione riguarda SOLO la casella cliccata:
    // escludo sia il proprio valore attuale (per garantire un cambiamento)
    // sia il valore dell'altra casella (per non creare un duplicato),
    // senza mai modificare l'altra casella
    let pool = players.filter(p => p !== ownVal && p !== otherVal);
    if (pool.length === 0) pool = players.filter(p => p !== ownVal);
    const candidate = pool[Math.floor(Math.random() * pool.length)];
    giocatoreVal[idx] = candidate;
  }

  renderResult(1);
  renderResult(2);
}

btnGioc1.addEventListener('click', () => drawPlayer(1));
btnGioc2.addEventListener('click', () => drawPlayer(2));

function isValidName(name) {
  if (!name) return "Inserisci un nome.";
  if (!NAME_REGEX.test(name)) return "Niente caratteri speciali.";
  if (players.some(p => p.toLowerCase() === name.toLowerCase())) return "Nome già presente.";
  return null;
}

function removePlayer(index) {
  const removed = players[index];
  players.splice(index, 1);
  giocatoreVal.forEach((v, i) => {
    if (v === removed) setGiocatore(i + 1, null);
  });
  savePlayers();
  renderPlayersGrid();
  renderResult(1);
  renderResult(2);
}

function addPlayer(name) {
  const clean = name.trim();
  const error = isValidName(clean);
  if (error) {
    playersError.textContent = error;
    return false;
  }
  playersError.textContent = "";
  players.push(clean);
  savePlayers();
  renderPlayersGrid();
  renderResult(1);
  renderResult(2);
  return true;
}

btnEliminaTutti.addEventListener('click', () => {
  if (players.length === 0) return;
  const conferma = confirm("Eliminare tutti i giocatori? L'azione non è reversibile.");
  if (!conferma) return;
  players = [];
  giocatoreVal = [null, null];
  savePlayers();
  renderPlayersGrid();
  renderResult(1);
  renderResult(2);
});

function renderPlayersGrid() {
  playersGrid.innerHTML = "";

  players.forEach((name, index) => {
    const slot = document.createElement('div');
    slot.className = 'player-slot';

    const nameSpan = document.createElement('span');
    nameSpan.className = 'player-name';
    nameSpan.textContent = name;

    const removeBtn = document.createElement('button');
    removeBtn.className = 'player-remove';
    removeBtn.textContent = '✕';
    removeBtn.addEventListener('click', () => removePlayer(index));

    slot.appendChild(nameSpan);
    slot.appendChild(removeBtn);
    playersGrid.appendChild(slot);
  });

  if (players.length < MAX_PLAYERS) {
    const inputWrap = document.createElement('div');
    inputWrap.className = 'player-input-wrap';

    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'player-input';
    input.placeholder = '+ aggiungi giocatore';
    input.maxLength = 24;

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        const ok = addPlayer(input.value);
        if (ok) {
          // dopo l'aggiunta, renderPlayersGrid ricrea l'input:
          // riportiamo subito il focus sul nuovo input per scrittura continua
          const newInput = document.querySelector('.player-input');
          if (newInput) newInput.focus();
        }
      }
    });

    inputWrap.appendChild(input);
    playersGrid.appendChild(inputWrap);
  }
}

renderPlayersGrid();
renderResult(1);
renderResult(2);
</script>
</body>
</html>
